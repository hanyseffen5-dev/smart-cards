kind = "web"
previewPath = "/"
title = "Smart Flash Cards AI"
version = "1.0.0"
id = "artifacts/smart-flashcards"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25881

[services.development]
run = "pnpm --filter @workspace/smart-flashcards run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-flashcards", "run", "build" ]
publicDir = "artifacts/smart-flashcards/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25881"
BASE_PATH = "/"
